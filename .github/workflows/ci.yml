name: CI
on: [push, pull_request]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: actions-rs/toolchain@b2417cde72dcf67f306c0ae8e0828a81bf0b189f # v1.0.6
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Format check
        run: cargo fmt -- --check

      - name: Lint (clippy)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build (release)
        run: cargo build --release

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: runa-${{ matrix.os }}
          path: |
            target/release/**

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download linux artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: runa-ubuntu-latest
          path: ubuntu-latest

      - name: Download macOS artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: runa-macos-latest
          path: macos-latest

      - name: Download windows artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: runa-windows-latest
          path: windows-latest

      - name: Create packages
        run: |
          set -euo pipefail
          mkdir -p dist

          # Copy built artifacts from matrix job output into dist with clear names (avoid unnecessary zipping)
          if [ -f "ubuntu-latest/target/release/runa" ]; then
            cp ubuntu-latest/target/release/runa dist/runa-linux-x86_64
          fi

          if [ -f "macos-latest/target/release/runa" ]; then
            cp macos-latest/target/release/runa dist/runa-macos-x86_64
          fi

          if [ -f "windows-latest/target/release/runa.exe" ]; then
            cp windows-latest/target/release/runa.exe dist/runa-windows-x86_64.exe
          fi

          # Ensure unix executables are runnable
          chmod +x dist/runa-*

          # Generate a single checksum file for all artifacts
          sha256sum dist/* > dist/sha256sums.txt || true

          # Create a small JSON manifest (filename -> sha256) using Python for correctness
          python3 - <<'PY' > dist/manifest.json
import json, os, hashlib
files = {}
for name in os.listdir('dist'):
    path = os.path.join('dist', name)
    if os.path.isfile(path):
        with open(path, 'rb') as fh:
            files[name] = hashlib.sha256(fh.read()).hexdigest()
print(json.dumps({'files': files, 'meta': {'commit': os.environ.get('GITHUB_SHA', ''), 'ref': os.environ.get('GITHUB_REF', '')}}, indent=2))
PY

      - name: Create draft release
        id: create_release
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1.1.4
        with:
          tag_name: ${{ github.sha }}
          release_name: Release ${{ github.sha }}
          body: |
            Auto-created draft release with built artifacts.
            See manifest and checksums attached.
          draft: true

      - name: Upload release assets (tar/zip + manifest + checksums)
        uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1.0.2
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/runa-linux-x86_64.tar.gz
          asset_name: runa-linux-x86_64.tar.gz
          asset_content_type: application/gzip

      - name: Upload macOS asset
        if: always()
        uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1.0.2
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/runa-macos-x86_64.zip
          asset_name: runa-macos-x86_64.zip
          asset_content_type: application/zip

      - name: Upload Windows asset
        if: always()
        uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1.0.2
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/runa-windows-x86_64.zip
          asset_name: runa-windows-x86_64.zip
          asset_content_type: application/zip

      - name: Upload manifest
        if: always()
        uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1.0.2
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/manifest.json
          asset_name: manifest.json
          asset_content_type: application/json

      - name: Upload checksums
        if: always()
        uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1.0.2
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/sha256sums.txt
          asset_name: sha256sums.txt
          asset_content_type: text/plain

  
